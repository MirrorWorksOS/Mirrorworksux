<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <title>Server Rack Chassis 42U</title>
  <defs>
    <linearGradient id="gfr" x1="70" y1="25" x2="70" y2="135" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8C98A4"/>
      <stop offset="100%" stop-color="#636E78"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#1A2732" flood-opacity="0.22"/>
    </filter>
  </defs>
  <g filter="url(#sh)">
    <!-- top face -->
    <path d="M70 25L85 12L145 12L130 25Z" fill="#B4BCC4"/>
    <!-- right face -->
    <path d="M130 25L145 12L145 122L130 135Z" fill="#505860"/>
    <!-- front face -->
    <rect x="70" y="25" width="60" height="110" rx="2" fill="url(#gfr)"/>
    <!-- rack unit bays (alternating shade for U slots) -->
    <rect x="80" y="30" width="40" height="17" rx="1" fill="#7A8490" opacity="0.55"/>
    <rect x="80" y="50" width="40" height="17" rx="1" fill="#7A8490" opacity="0.35"/>
    <rect x="80" y="69" width="40" height="17" rx="1" fill="#7A8490" opacity="0.55"/>
    <rect x="80" y="87" width="40" height="17" rx="1" fill="#7A8490" opacity="0.35"/>
    <rect x="80" y="105" width="40" height="17" rx="1" fill="#7A8490" opacity="0.55"/>
    <rect x="80" y="123" width="40" height="9" rx="1" fill="#7A8490" opacity="0.35"/>
  </g>
  <!-- outline strokes -->
  <rect x="70" y="25" width="60" height="110" rx="2" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M70 25L85 12L145 12L130 25" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M145 12L145 122L130 135" stroke="#1A2732" stroke-width="1.5"/>
  <!-- mounting rails -->
  <line x1="80" y1="30" x2="80" y2="130" stroke="#1A2732" stroke-width="1"/>
  <line x1="120" y1="30" x2="120" y2="130" stroke="#1A2732" stroke-width="1"/>
  <!-- rack unit dividers -->
  <line x1="80" y1="50" x2="120" y2="50" stroke="#1A2732" stroke-width="0.75"/>
  <line x1="80" y1="68" x2="120" y2="68" stroke="#1A2732" stroke-width="0.75"/>
  <line x1="80" y1="86" x2="120" y2="86" stroke="#1A2732" stroke-width="0.75"/>
  <line x1="80" y1="104" x2="120" y2="104" stroke="#1A2732" stroke-width="0.75"/>
  <line x1="80" y1="122" x2="120" y2="122" stroke="#1A2732" stroke-width="0.75"/>
  <!-- highlight: top-left edge of front face -->
  <line x1="70" y1="25" x2="70" y2="135" stroke="#BCC4CC" stroke-width="1.5"/>
  <path d="M70 25L85 12L145 12" stroke="#D4DCE4" stroke-width="2"/>
  <!-- corner mounting holes -->
  <circle cx="76" cy="32" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="124" cy="32" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="76" cy="128" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="124" cy="128" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
</svg>
