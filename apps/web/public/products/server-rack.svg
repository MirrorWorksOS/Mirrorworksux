<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke="#1A2732" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <title>Server Rack Chassis 42U</title>
  <!-- depth back -->
  <path d="M 70 25 L 85 12 L 145 12 L 130 25"/>
  <path d="M 145 12 L 145 122 L 130 135"/>
  <!-- front frame -->
  <rect x="70" y="25" width="60" height="110" rx="2"/>
  <!-- mounting rails -->
  <line x1="80" y1="30" x2="80" y2="130"/>
  <line x1="120" y1="30" x2="120" y2="130"/>
  <!-- rack unit dividers -->
  <line x1="80" y1="50" x2="120" y2="50"/>
  <line x1="80" y1="68" x2="120" y2="68"/>
  <line x1="80" y1="86" x2="120" y2="86"/>
  <line x1="80" y1="104" x2="120" y2="104"/>
  <line x1="80" y1="122" x2="120" y2="122"/>
  <!-- corner mounting holes -->
  <circle cx="76" cy="32" r="2.5" fill="#FFCF4B"/>
  <circle cx="124" cy="32" r="2.5" fill="#FFCF4B"/>
  <circle cx="76" cy="128" r="2.5" fill="#FFCF4B"/>
  <circle cx="124" cy="128" r="2.5" fill="#FFCF4B"/>
</svg>
