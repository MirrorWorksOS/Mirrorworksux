<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <title>Cable Tray Support 600mm</title>
  <defs>
    <linearGradient id="gfr" x1="25" y1="50" x2="25" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8A9890"/>
      <stop offset="100%" stop-color="#667870"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#1A2732" flood-opacity="0.20"/>
    </filter>
  </defs>
  <g filter="url(#sh)">
    <!-- right outer depth face (shadow) -->
    <path d="M175 50L195 35L195 95L175 110Z" fill="#4C5C56"/>
    <!-- top rim face -->
    <path d="M25 50L45 35L195 35L175 50Z" fill="#B4BEB4"/>
    <!-- inner tray floor (visible looking into top) -->
    <path d="M40 65L60 50L180 50L160 65Z" fill="#98A49C"/>
    <!-- front U-channel face -->
    <path d="M25 50L25 110L40 110L40 65L160 65L160 110L175 110L175 50Z" fill="url(#gfr)"/>
  </g>
  <!-- outline strokes -->
  <path d="M25 50L25 110L40 110L40 65L160 65L160 110L175 110L175 50Z" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M25 50L45 35L195 35L175 50" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M195 35L195 95L175 110" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M40 65L60 50" stroke="#1A2732" stroke-width="1"/>
  <path d="M160 65L180 50" stroke="#1A2732" stroke-width="1"/>
  <!-- highlight: near-left lit edges -->
  <path d="M25 50L25 110" stroke="#B8C4BC" stroke-width="2"/>
  <path d="M25 50L45 35L195 35" stroke="#CED8CE" stroke-width="2"/>
  <!-- ventilation slots (brand yellow accent) -->
  <line x1="55" y1="100" x2="78" y2="100" stroke="#FFCF4B" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="100" x2="112" y2="100" stroke="#FFCF4B" stroke-width="4" stroke-linecap="round"/>
  <line x1="122" y1="100" x2="145" y2="100" stroke="#FFCF4B" stroke-width="4" stroke-linecap="round"/>
</svg>
