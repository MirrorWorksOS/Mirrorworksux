<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <title>Base Plate 200×200 — Stainless 304</title>
  <defs>
    <!-- top face: bright cool grey-blue, left-to-right light falloff -->
    <linearGradient id="gt" x1="40" y1="75" x2="170" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4DCE8"/>
      <stop offset="100%" stop-color="#A4B0BC"/>
    </linearGradient>
    <!-- front face -->
    <linearGradient id="gfr" x1="80" y1="95" x2="170" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8A9299"/>
      <stop offset="100%" stop-color="#78848C"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#1A2732" flood-opacity="0.20"/>
    </filter>
  </defs>
  <g filter="url(#sh)">
    <!-- right face (shadow side) -->
    <path d="M130 55L130 70L170 110L170 95Z" fill="#5E6C78"/>
    <!-- front/near-bottom face -->
    <path d="M80 95L80 110L170 110L170 95Z" fill="url(#gfr)"/>
    <!-- top face -->
    <path d="M40 55L130 55L170 95L80 95Z" fill="url(#gt)"/>
  </g>
  <!-- outline strokes -->
  <path d="M40 55L130 55L170 95L80 95Z" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M130 55L130 70L170 110L170 95" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M80 95L80 110L170 110" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M130 70L170 110" stroke="#1A2732" stroke-width="1"/>
  <!-- highlight edges (near-left edges, bright stainless) -->
  <path d="M40 55L130 55" stroke="#E2EAF4" stroke-width="2"/>
  <path d="M40 55L80 95" stroke="#C8D4DC" stroke-width="1.5"/>
  <!-- brushed-stainless grain lines on top face -->
  <line x1="62" y1="60" x2="102" y2="100" stroke="#E0E8F2" stroke-width="0.8" opacity="0.55"/>
  <line x1="82" y1="58" x2="122" y2="98" stroke="#E0E8F2" stroke-width="0.8" opacity="0.45"/>
  <line x1="102" y1="58" x2="142" y2="98" stroke="#E0E8F2" stroke-width="0.8" opacity="0.35"/>
  <!-- mounting hole fastener heads -->
  <ellipse cx="55" cy="65" rx="5" ry="3.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <ellipse cx="55" cy="65" rx="2" ry="1.4" fill="#1A2732" opacity="0.4"/>
  <ellipse cx="115" cy="65" rx="5" ry="3.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <ellipse cx="115" cy="65" rx="2" ry="1.4" fill="#1A2732" opacity="0.4"/>
  <ellipse cx="95" cy="85" rx="5" ry="3.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <ellipse cx="95" cy="85" rx="2" ry="1.4" fill="#1A2732" opacity="0.4"/>
  <ellipse cx="155" cy="85" rx="5" ry="3.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <ellipse cx="155" cy="85" rx="2" ry="1.4" fill="#1A2732" opacity="0.4"/>
</svg>
