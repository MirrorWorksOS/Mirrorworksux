<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <title>Aluminium Enclosure Panel — IP65</title>
  <defs>
    <!-- warm silver aluminium, light from top-left -->
    <linearGradient id="gfr" x1="35" y1="35" x2="35" y2="125" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4BEB0"/>
      <stop offset="100%" stop-color="#8E8A82"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#1A2732" flood-opacity="0.20"/>
    </filter>
  </defs>
  <g filter="url(#sh)">
    <!-- top face -->
    <path d="M35 35L50 22L180 22L165 35Z" fill="#D0CCBE"/>
    <!-- right face -->
    <path d="M165 35L180 22L180 112L165 125Z" fill="#5E5A52"/>
    <!-- front face -->
    <rect x="35" y="35" width="130" height="90" rx="2" fill="url(#gfr)"/>
    <!-- gasket inset (slightly recessed face, subtle darker fill) -->
    <rect x="48" y="48" width="104" height="64" rx="1" fill="#A8A49C" opacity="0.30"/>
  </g>
  <!-- outline strokes -->
  <rect x="35" y="35" width="130" height="90" rx="2" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M35 35L50 22L180 22L165 35" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M180 22L180 112L165 125" stroke="#1A2732" stroke-width="1.5"/>
  <!-- inner gasket line (IP65 seal groove) -->
  <rect x="48" y="48" width="104" height="64" rx="1" stroke="#1A2732" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- highlight: top-left lit edges -->
  <path d="M35 35L35 125" stroke="#D8D4C8" stroke-width="2"/>
  <path d="M50 22L180 22" stroke="#E4E0D4" stroke-width="2"/>
  <!-- mounting holes (perimeter fasteners) -->
  <circle cx="42" cy="42" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="100" cy="42" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="158" cy="42" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="42" cy="80" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="158" cy="80" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="42" cy="118" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="100" cy="118" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
  <circle cx="158" cy="118" r="2.5" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.75"/>
</svg>
