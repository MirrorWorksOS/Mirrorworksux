<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <title>Mounting Bracket 90°</title>
  <defs>
    <linearGradient id="gf" x1="55" y1="30" x2="55" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9EA8B0"/>
      <stop offset="100%" stop-color="#70787E"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#1A2732" flood-opacity="0.20"/>
    </filter>
  </defs>
  <g filter="url(#sh)">
    <!-- top of vertical arm -->
    <path d="M55 30L70 18L110 18L95 30Z" fill="#C4CCD4"/>
    <!-- right face of vertical arm -->
    <path d="M95 30L110 18L110 88L95 100Z" fill="#565E66"/>
    <!-- top of horizontal arm -->
    <path d="M95 100L110 88L175 88L160 100Z" fill="#BEC6CE"/>
    <!-- right face of horizontal arm -->
    <path d="M160 100L175 88L175 118L160 130Z" fill="#4E565C"/>
    <!-- front L-face -->
    <path d="M55 30L95 30L95 100L160 100L160 130L55 130Z" fill="url(#gf)"/>
  </g>
  <!-- outline strokes -->
  <path d="M55 30L95 30L95 100L160 100L160 130L55 130Z" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M55 30L70 18L110 18L95 30" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M95 30L110 18" stroke="#1A2732" stroke-width="1"/>
  <path d="M110 18L110 88L95 100" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M110 88L175 88L160 100" stroke="#1A2732" stroke-width="1.5"/>
  <path d="M175 88L175 118L160 130" stroke="#1A2732" stroke-width="1.5"/>
  <!-- highlight edges (top-left catches light) -->
  <path d="M70 18L110 18" stroke="#DDE3E8" stroke-width="2"/>
  <path d="M55 30L55 130" stroke="#BDC5CC" stroke-width="1.5"/>
  <path d="M55 30L95 30" stroke="#C8D0D8" stroke-width="1.5"/>
  <!-- fastener heads -->
  <circle cx="75" cy="50" r="5" fill="#FFCF4B" stroke="#1A2732" stroke-width="1"/>
  <circle cx="75" cy="50" r="2" fill="#1A2732" opacity="0.45"/>
  <circle cx="75" cy="78" r="5" fill="#FFCF4B" stroke="#1A2732" stroke-width="1"/>
  <circle cx="75" cy="78" r="2" fill="#1A2732" opacity="0.45"/>
  <circle cx="120" cy="115" r="5" fill="#FFCF4B" stroke="#1A2732" stroke-width="1"/>
  <circle cx="120" cy="115" r="2" fill="#1A2732" opacity="0.45"/>
  <circle cx="145" cy="115" r="5" fill="#FFCF4B" stroke="#1A2732" stroke-width="1"/>
  <circle cx="145" cy="115" r="2" fill="#1A2732" opacity="0.45"/>
</svg>
