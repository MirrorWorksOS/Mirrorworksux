<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <title>Handrail Section — Stainless 316</title>
  <defs>
    <!-- tube cross-section gradient: lit from top -->
    <linearGradient id="gtr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D2DAE8"/>
      <stop offset="30%" stop-color="#E0E8F4"/>
      <stop offset="65%" stop-color="#8898B0"/>
      <stop offset="100%" stop-color="#606E84"/>
    </linearGradient>
    <!-- post gradient: lit from left -->
    <linearGradient id="gpo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8D4E4"/>
      <stop offset="35%" stop-color="#E0E8F4"/>
      <stop offset="70%" stop-color="#9098AC"/>
      <stop offset="100%" stop-color="#607080"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#1A2732" flood-opacity="0.20"/>
    </filter>
  </defs>
  <g filter="url(#sh)">
    <!-- post base plates (flat stainless) -->
    <rect x="28" y="124" width="24" height="9" rx="1" fill="#A0ACB8"/>
    <rect x="88" y="124" width="24" height="9" rx="1" fill="#A0ACB8"/>
    <rect x="148" y="124" width="24" height="9" rx="1" fill="#A0ACB8"/>
    <!-- vertical posts (tube cross-section via rect+gradient) -->
    <rect x="37" y="39" width="6" height="85" fill="url(#gpo)"/>
    <rect x="97" y="39" width="6" height="85" fill="url(#gpo)"/>
    <rect x="157" y="39" width="6" height="85" fill="url(#gpo)"/>
    <!-- mid rail tube -->
    <rect x="20" y="65" width="160" height="6" rx="3" fill="url(#gtr)"/>
    <!-- top rail tube -->
    <rect x="20" y="31" width="160" height="8" rx="4" fill="url(#gtr)"/>
  </g>
  <!-- post base plate outlines -->
  <rect x="28" y="124" width="24" height="9" rx="1" stroke="#1A2732" stroke-width="1"/>
  <rect x="88" y="124" width="24" height="9" rx="1" stroke="#1A2732" stroke-width="1"/>
  <rect x="148" y="124" width="24" height="9" rx="1" stroke="#1A2732" stroke-width="1"/>
  <!-- post outlines -->
  <rect x="37" y="39" width="6" height="85" stroke="#1A2732" stroke-width="1"/>
  <rect x="97" y="39" width="6" height="85" stroke="#1A2732" stroke-width="1"/>
  <rect x="157" y="39" width="6" height="85" stroke="#1A2732" stroke-width="1"/>
  <!-- rail outlines -->
  <rect x="20" y="65" width="160" height="6" rx="3" stroke="#1A2732" stroke-width="1"/>
  <rect x="20" y="31" width="160" height="8" rx="4" stroke="#1A2732" stroke-width="1.5"/>
  <!-- tube highlight line (polished top edge) -->
  <line x1="22" y1="33" x2="178" y2="33" stroke="#EEF4FC" stroke-width="1.5" opacity="0.8"/>
  <line x1="22" y1="67" x2="178" y2="67" stroke="#EEF4FC" stroke-width="1" opacity="0.7"/>
  <!-- floor reference -->
  <line x1="10" y1="138" x2="190" y2="138" stroke="#1A2732" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <!-- end caps (brand yellow) -->
  <circle cx="20" cy="35" r="5" fill="#FFCF4B" stroke="#1A2732" stroke-width="1"/>
  <circle cx="180" cy="35" r="5" fill="#FFCF4B" stroke="#1A2732" stroke-width="1"/>
  <!-- bolt accents on base plates -->
  <circle cx="33" cy="129" r="2" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.5"/>
  <circle cx="47" cy="129" r="2" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.5"/>
  <circle cx="93" cy="129" r="2" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.5"/>
  <circle cx="107" cy="129" r="2" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.5"/>
  <circle cx="153" cy="129" r="2" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.5"/>
  <circle cx="167" cy="129" r="2" fill="#FFCF4B" stroke="#1A2732" stroke-width="0.5"/>
</svg>
