<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke="#1A2732" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <title>Handrail Section — Stainless 316</title>
  <!-- top rail -->
  <line x1="20" y1="35" x2="180" y2="35"/>
  <!-- mid rail -->
  <line x1="20" y1="68" x2="180" y2="68"/>
  <!-- end caps on top rail -->
  <circle cx="20" cy="35" r="5" fill="#FFCF4B"/>
  <circle cx="180" cy="35" r="5" fill="#FFCF4B"/>
  <!-- vertical posts -->
  <line x1="40" y1="35" x2="40" y2="125"/>
  <line x1="100" y1="35" x2="100" y2="125"/>
  <line x1="160" y1="35" x2="160" y2="125"/>
  <!-- post base plates -->
  <rect x="30" y="125" width="20" height="8" rx="1"/>
  <rect x="90" y="125" width="20" height="8" rx="1"/>
  <rect x="150" y="125" width="20" height="8" rx="1"/>
  <!-- floor reference -->
  <line x1="10" y1="138" x2="190" y2="138" stroke-dasharray="3 3"/>
  <!-- bolt accents -->
  <circle cx="35" cy="129" r="2" fill="#FFCF4B"/>
  <circle cx="45" cy="129" r="2" fill="#FFCF4B"/>
  <circle cx="95" cy="129" r="2" fill="#FFCF4B"/>
  <circle cx="105" cy="129" r="2" fill="#FFCF4B"/>
  <circle cx="155" cy="129" r="2" fill="#FFCF4B"/>
  <circle cx="165" cy="129" r="2" fill="#FFCF4B"/>
</svg>
